<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Us</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* Background */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('nahoon.jpg') center/cover no-repeat;
  filter: blur(8px);
  z-index: -1;
}

/* Landing */
.landing {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100vh;
}

.person {
  text-align: center;
  cursor: pointer;
}

.person img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 20px;
  filter: blur(6px);
  transition: 0.4s;
}

.person:hover img {
  filter: blur(2px);
}

.name {
  margin-top: 10px;
  font-size: 28px;
  color: maroon;
  font-family: 'Great Vibes', cursive;
}

/* Profile View */
.profile {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.id-card {
  background: #fff5f7;
  padding: 20px;
  border-radius: 20px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.id-top {
  display: flex;
  gap: 15px;
}

.id-top img {
  width: 100px;
  height: 100px;
  border-radius: 15px;
  object-fit: cover;
}

.id-text {
  font-family: 'Great Vibes', cursive;
  color: maroon;
  font-size: 18px;
}

.letter {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  width: 400px;
  font-family: 'Great Vibes', cursive;
  color: maroon;
  font-size: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.back {
  position: absolute;
  top: 20px;
  left: 20px;
  cursor: pointer;
  font-size: 18px;
  color: maroon;
}
</style>
</head>
<body>

<div class="background"></div>

<!-- Landing -->
<div class="landing" id="landing">
  <div class="person" onclick="openProfile('person1')">
    <img src="person1.jpg">
    <div class="name">Enkosi-Kwandolwethu</div>
  </div>

  <div class="person" onclick="openProfile('person2')">
    <img src="person2.jpg">
    <div class="name">Luyanda</div>
  </div>
</div>

<!-- Profile -->
<div class="profile" id="profile">
  <div class="back" onclick="goBack()">← Back</div>

  <div class="id-card" id="idCard"></div>
  <div class="letter" id="letter"></div>
</div>

<script>
function openProfile(person) {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('profile').style.display = 'flex';

  if(person === 'person1') {
    document.getElementById('idCard').innerHTML = `
      <div class="id-top">
        <img src="person1.jpg">
        <div class="id-text">
          Name: Enkosi-Kwandolwethu💌<br>
          Loves: Luyanda<br>
          Status: Taken ❤️<br>
          Since: Always
        </div>
      </div>
    `;

    document.getElementById('letter').innerHTML = `
      I never thought something this soft could exist until I met you...<br><br>
      You changed the way I see everything, even the quiet moments feel full now.<br><br>
      If I had to choose again, it would still be you. Always you.
    `;
  }

  if(person === 'person2') {
    document.getElementById('idCard').innerHTML = `
      <div class="id-top">
        <img src="person2.jpg">
        <div class="id-text">
          Name: Luyanda💌<br>
          Loves: Enkosi-Kwandolwethu<br>
          Status: Yours ❤️<br>
          Since: The beginning
        </div>
      </div>
    `;

    document.getElementById('letter').innerHTML = `
      Somehow, you became my favorite part of every day...<br><br>
      You make everything feel lighter, softer, better.<br><br>
      I didn't just fall for you... I found home in you.
    `;
  }
}

function goBack() {
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('profile').style.display = 'none';
}
</script>

</body>
</html>
