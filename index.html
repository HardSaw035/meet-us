<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('nahoon.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* SOFT OVERLAY */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 50px;
}

/* CARD */
.card {
  position: relative;
  width: 300px;
  height: 200px;
  border-radius: 25px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.4s ease;
  z-index: 1;
}

.card:hover {
  transform: scale(1.05);
}

/* BLURRED IMAGE */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(8px) brightness(0.7);
  transition: transform 0.5s ease;
}

.card:hover::before {
  transform: scale(1.1);
}

/* TEXT — ROMANTIC STYLE */
.card h1 {
  position: relative;
  z-index: 2;
  color: maroon;              /* red/maroon color */
  font-family: 'Brush Script MT', cursive; /* cursive font */
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2.5em;
  letter-spacing: 1px;
  margin: 0;
  text-shadow: 0 0 10px rgba(0,0,0,0.7);
}

/* IMAGES */
.person1::before {
  background-image: url('her.jpg');
}

.person2::before {
  background-image: url('him.jpg');
}
</style>
</head>

<body>

<div class="container">

  <div class="card person1" onclick="goToPage('her.html')">
    <h1>Her Name</h1>
  </div>

  <div class="card person2" onclick="goToPage('him.html')">
    <h1>Your Name</h1>
  </div>

</div>

<script>
function goToPage(page) {
  window.location.href = page;
}
</script>

</body>
</html>
