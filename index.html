<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Us</title>
<style>
  /* BODY STYLES */
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffe6f0; /* soft baby pink */
    font-family: 'Brush Script MT', cursive;
    perspective: 1000px;
    overflow: hidden;
  }

  /* HEART CONTAINER */
  .heart-container {
    position: relative;
    width: 250px;
    height: 230px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    animation: pulse 2s infinite;
  }

  /* 3D hover effect */
  .heart-container:hover {
    transform: rotateY(20deg) rotateX(10deg) scale(1.1);
  }

  /* PULSE ANIMATION */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* HEART SHAPE */
  .heart {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ffb6c1, #ff85a2);
    clip-path: polygon(
      50% 0%, 61% 7%, 68% 15%, 75% 25%, 79% 35%, 80% 50%, 
      79% 65%, 75% 75%, 68% 85%, 61% 93%, 50% 100%, 39% 93%, 
      32% 85%, 25% 75%, 21% 65%, 20% 50%, 21% 35%, 25% 25%, 
      32% 15%, 39% 7%
    );
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: box-shadow 0.3s ease;
  }

  /* Slight shadow hover */
  .heart-container:hover .heart {
    box-shadow: 0 12px 25px rgba(0,0,0,0.3);
  }

  /* TEXT ON HEART */
  .heart h1 {
    margin: 0;
    font-size: 2.5em;
    color: white;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transform: translateZ(20px); /* slight 3D pop */
    pointer-events: none;
  }

  /* FADE TRANSITION ON CLICK */
  .fade-out {
    animation: fadeOut 0.5s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(0.9); }
  }
</style>
</head>
<body>

<div class="heart-container" id="heart">
  <div class="heart">
    <h1>Meet Us</h1>
  </div>
</div>

<script>
  // Click handler with fade effect
  const heart = document.getElementById('heart');
  heart.addEventListener('click', () => {
    heart.classList.add('fade-out');
    setTimeout(() => {
      window.location.href = 'main.html';
    }, 500); // wait for fade-out animation
  });
</script>

</body>
</html>
