<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Us</title>
<style>
  /* BODY STYLES */
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffe6f0; /* soft baby pink background */
    font-family: 'Brush Script MT', cursive;
    perspective: 1000px; /* for 3D effect */
  }

  /* HEART CONTAINER */
  .heart-container {
    position: relative;
    width: 250px;
    height: 230px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }

  .heart-container:hover {
    transform: rotateY(20deg) rotateX(10deg) scale(1.1);
  }

  /* HEART SHAPE */
  .heart {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ffb6c1, #ff85a2); /* pink gradient */
    clip-path: polygon(
      50% 0%, 
      61% 7%, 
      68% 15%, 
      75% 25%, 
      79% 35%, 
      80% 50%, 
      79% 65%, 
      75% 75%, 
      68% 85%, 
      61% 93%, 
      50% 100%, 
      39% 93%, 
      32% 85%, 
      25% 75%, 
      21% 65%, 
      20% 50%, 
      21% 35%, 
      25% 25%, 
      32% 15%, 
      39% 7%
    );
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  /* TEXT ON HEART */
  .heart h1 {
    margin: 0;
    font-size: 2.5em;
    color: white;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transform: translateZ(20px); /* slight 3D pop */
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="heart-container">
  <div class="heart">
    <h1>Meet Us</h1>
  </div>
</div>

</body>
</html>
