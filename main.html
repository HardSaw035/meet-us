<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('nahoon.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* SHARED FLEX SETTINGS */
section {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
  padding: 50px 20px;
}

/* NAME CARDS */
.name-container, .id-card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  cursor: pointer;
}

/* SIZE DIFFERENCE */
.name-container {
  width: 300px;
  height: 200px;
}

.id-card {
  width: 250px;
  height: 150px;
}

/* BACKGROUND IMAGE LAYER */
.name-container::before,
.id-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(4px) brightness(0.75);
  transition: transform 0.5s ease;
  z-index: 1;
}

/* HOVER EFFECT */
.name-container:hover::before,
.id-card:hover::before {
  transform: scale(1.1);
}

/* TEXT */
.name-container h1,
.id-card h2 {
  position: relative;
  z-index: 2;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  margin: 0;
  text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* IMAGE ASSIGNMENTS */
.her::before {
  background-image: url('her.jpg');
}

.him::before {
  background-image: url('him.jpg');
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .name-container {
    width: 90%;
  }
  .id-card {
    width: 80%;
  }
}
</style>
</head>

<body>

<section>
  <div class="name-container her">
    <h1>Her</h1>
  </div>

  <div class="name-container him">
    <h1>Him</h1>
  </div>
</section>

<section>
  <div class="id-card her">
    <h2>Her</h2>
  </div>

  <div class="id-card him">
    <h2>Him</h2>
  </div>
</section>

</body>
</html>
